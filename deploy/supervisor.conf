; Supervisor configuration for Progressia queue workers
;
; Place this file at /etc/supervisor/conf.d/progressia-worker.conf
; (or another path included by your supervisord.conf), then run:
;
;   sudo supervisorctl reread
;   sudo supervisorctl update
;   sudo supervisorctl start progressia-worker:*
;
; Adjust `user`, `command`, and `directory` to match your deploy setup.

[program:progressia-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/progressia/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=forge
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/progressia/storage/logs/worker.log
stopwaitsecs=3600
